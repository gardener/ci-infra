apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: monitoring
  namespace: monitoring
  annotations:
    cert.gardener.cloud/issuer: ci-issuer
    cert.gardener.cloud/purpose: managed
    dns.gardener.cloud/class: garden
    dns.gardener.cloud/dnsnames: monitoring-build.prow.gardener.cloud
spec:
  gatewayClassName: prow
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    hostname: monitoring-build.prow.gardener.cloud
    tls:
      mode: Terminate
      certificateRefs:
      - name: monitoring-tls
        namespace: monitoring
    allowedRoutes:
      namespaces:
        from: Same
