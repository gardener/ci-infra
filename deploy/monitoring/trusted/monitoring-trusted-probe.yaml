apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: monitoring-trusted
  namespace: prow
spec:
  interval: 15s
  module: http_auth_protected
  prober:
    url: blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
      - https://monitoring.prow.gardener.cloud
